name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  # schedule disabled — re-enable once ImagePullBackOff resolved and app cluster healthy
  # schedule:
  #   - cron: '0 6 * * *'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22'

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          PRODUCT_CATALOG_URL: ${{ vars.PRODUCT_CATALOG_URL || 'http://localhost:8000' }}
          BASKET_URL: ${{ vars.BASKET_URL || 'http://localhost:8083' }}
          ORDER_URL: ${{ vars.ORDER_URL || 'http://localhost:8080' }}
          OAUTH2_ENABLED: 'false'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  flow-tests:
    name: Flow Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: api-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run flow tests
        run: npx playwright test --project=flows
        env:
          PRODUCT_CATALOG_URL: ${{ vars.PRODUCT_CATALOG_URL || 'http://localhost:8000' }}
          BASKET_URL: ${{ vars.BASKET_URL || 'http://localhost:8083' }}
          ORDER_URL: ${{ vars.ORDER_URL || 'http://localhost:8080' }}
          OAUTH2_ENABLED: 'false'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  all-tests:
    name: All Tests (Full Suite)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run all tests
        run: npx playwright test
        env:
          PRODUCT_CATALOG_URL: ${{ vars.PRODUCT_CATALOG_URL || 'http://localhost:8000' }}
          BASKET_URL: ${{ vars.BASKET_URL || 'http://localhost:8083' }}
          ORDER_URL: ${{ vars.ORDER_URL || 'http://localhost:8080' }}
          OAUTH2_ENABLED: 'false'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload test report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          path: playwright-report/

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [api-tests, flow-tests]
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Send notification
        run: |
          echo "E2E tests failed - notification would be sent here"
          # Add Slack/Email notification here
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"E2E Tests Failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
